name: CI

# Build + test the b017 token library on every push and pull request, and auto-publish to npm
# when a new version lands on main.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage summary (for the badge job)
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json

      - name: Verify package contents (npm pack)
        run: npm pack --dry-run

  # Self-hosted coverage badge — no third-party service. Computes the statements % from the
  # coverage summary produced by build-test and writes a shields.io "endpoint" JSON to a dedicated
  # `badges` branch using the built-in GITHUB_TOKEN. The README badge points shields.io at that
  # file's raw URL. The commit carries [skip ci] so it never re-triggers this workflow.
  coverage-badge:
    needs: build-test
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-summary
          path: cov

      - name: Build shields endpoint JSON
        run: |
          PCT=$(node -e "console.log(Math.round(require('./cov/coverage-summary.json').total.statements.pct))")
          if   [ "$PCT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$PCT" -ge 80 ]; then COLOR=green
          elif [ "$PCT" -ge 70 ]; then COLOR=yellowgreen
          elif [ "$PCT" -ge 60 ]; then COLOR=yellow
          else COLOR=red; fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > /tmp/coverage.json
          cat /tmp/coverage.json

      - name: Publish badge to the badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch --depth 1 origin badges
            git worktree add --detach bw FETCH_HEAD
            git -C bw checkout -B badges
          else
            git worktree add --detach bw
            git -C bw checkout --orphan badges
            git -C bw rm -rf . >/dev/null 2>&1 || true
          fi
          cp /tmp/coverage.json bw/coverage.json
          git -C bw add coverage.json
          if git -C bw diff --cached --quiet; then
            echo "coverage badge unchanged — nothing to push."
            exit 0
          fi
          git -C bw commit -m "chore: update coverage badge [skip ci]"
          git -C bw push origin badges

  # Publish to npm when the version in package.json is new. Runs only on a push to main (i.e. after a
  # PR is merged), and only after build-test passes. Safely no-ops if NPM_TOKEN isn't set yet or the
  # version is already published, so it never reds-out main.
  publish:
    needs: build-test
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Publish if the version is new
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping publish."
            exit 0
          fi
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already on npm — nothing to publish."
          else
            echo "Publishing $NAME@$VERSION…"
            npm publish --provenance --access public
          fi
